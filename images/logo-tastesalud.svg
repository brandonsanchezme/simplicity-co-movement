  <!-- pink accent shadow effect -->
  <text x="117" y="60" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700" fill="none" stroke="#e8294a" stroke-width="1" text-anchor="middle" letter-spacing="1" opacity="0.6">SALUD.</text>
